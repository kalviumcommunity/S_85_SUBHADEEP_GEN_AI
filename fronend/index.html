<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot</title>
    <!-- Link to Tailwind CSS for utility classes -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Link to your custom stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
    <!-- Chatbot container -->
    <div class="w-full max-w-lg h-[90vh] md:h-[80vh] bg-white rounded-2xl shadow-2xl flex flex-col">
        <!-- Header -->
        <div class="bg-blue-600 text-white p-4 rounded-t-2xl flex items-center shadow-md">
            <div class="w-12 h-12 bg-white rounded-full flex items-center justify-center mr-4">
                <!-- Simple robot SVG icon -->
                <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M12 6a2 2 0 100-4 2 2 0 000 4zm0 14a2 2 0 100-4 2 2 0 000 4zm6-8a2 2 0 100-4 2 2 0 000 4zm-12 0a2 2 0 100-4 2 2 0 000 4z"></path></svg>
            </div>
            <div>
                <h1 class="text-xl font-bold">Gen AI</h1>
                <p class="text-sm opacity-80">Online</p>
            </div>
        </div>

        <!-- Chat Log -->
        <div id="chat-log" class="flex-1 p-6 overflow-y-auto">
            <!-- Initial bot message -->
            <div class="flex justify-start mb-4 chat-bubble">
                <div class="bg-gray-200 text-gray-800 p-3 rounded-lg max-w-xs">
                    <p>Hello! I'm an AI-powered assistant. How can I help you today?</p>
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="p-4 bg-gray-50 rounded-b-2xl border-t border-gray-200">
            <div class="flex items-center">
                <input type="text" id="user-input" placeholder="Type your message..." class="flex-1 px-4 py-3 border border-gray-300 rounded-full focus:outline-none focus:ring-2 focus:ring-blue-500 transition duration-300">
                <button id="send-button" class="ml-3 bg-blue-600 text-white p-3 rounded-full hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition-transform duration-200 transform hover:scale-110">
                    <!-- Send icon SVG -->
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Link to your JavaScript file -->
    <script src="script.js"></script>
</body>
</html>
